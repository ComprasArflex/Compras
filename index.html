<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Requisição de Materiais para Obra</title>
  <style>
    :root {
      --bg: #edf7f0;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #cfd8d3;
      --accent: #2f6f4e;
      --accent-2: #4c9a6a;
      --danger: #b91c1c;
      --shadow: 0 10px 26px rgba(30, 41, 59, 0.08);
      --radius: 18px;
    }

    * { 
      box-sizing: border-box; 
      font-family: Calibri, Arial, sans-serif;
    }

    html, body { margin: 0; padding: 0; }

    body {
      background: linear-gradient(180deg, #eef8f1 0%, var(--bg) 100%);
      color: var(--text);
      font-family: Calibri, Arial, sans-serif;
    }

    /* garante consistência nos campos */
    input, select, textarea, button {
      font-family: Calibri, Arial, sans-serif;
    }

    .container {
      max-width: 1180px;
      margin: 20px auto;
      padding: 0 14px 28px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(76, 154, 106, 0.12);
    }

    .header {
      display: flex;
      gap: 18px;
      align-items: flex-start;
      padding: 20px 22px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, #f7fcf8 0%, #e9f6ef 100%);
    }

    .logo-box {
      width: 122px;
      min-width: 122px;
      height: 92px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(76, 154, 106, 0.04);
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .logo-placeholder {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.25;
      padding: 10px;
    }

    .header-title {
      flex: 1;
      min-width: 0;
    }

    .header-title h1 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.15;
      color: var(--accent);
      letter-spacing: 0.3px;
    }

    .header-title p {
      margin: 0;
      white-space: pre-line;
      font-size: 13px;
      line-height: 1.5;
      color: #2f3a35;
      font-weight: 700;
    }

    .content {
      padding: 20px 22px 22px;
      display: grid;
      gap: 18px;
    }

    .section {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 18px;
      color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
    }

    .field {
      grid-column: span 6;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .field.wide { grid-column: span 12; }
    .field.company { grid-column: span 3; }
    .field.obra { grid-column: span 6; }
    .field.meta { grid-column: span 3; }

    label {
      font-size: 13px;
      font-weight: 700;
      color: #34423a;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(76, 154, 106, 0.12);
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.06s ease, box-shadow 0.06s ease, opacity 0.06s ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: var(--accent-2);
      color: #fff;
      box-shadow: 0 6px 14px rgba(76, 154, 106, 0.18);
    }

    .btn-secondary {
      background: #e5ebe7;
      color: #243128;
    }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead th {
      background: #f3faf5;
      color: #355043;
      font-size: 13px;
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    tbody td {
      border-bottom: 1px solid #e4ebe6;
      padding: 10px 12px;
      background: #fff;
    }

    .col-qty { width: 108px; }
    .col-unit { width: 150px; }
    .col-desc { width: auto; }
    .col-action { width: 108px; }

    .item-input, .item-select, .item-textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      background: #fff;
    }

    .item-input {
      max-width: 92px;
      text-align: right;
    }

    .item-textarea {
      min-height: 76px;
    }

    .row-action-btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #f4c7c7;
      background: #fff5f5;
      color: var(--danger);
      font-weight: 700;
      cursor: pointer;
    }

    .footer-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .summary {
      font-size: 12px;
      color: var(--muted);
    }

    .meta-box {
      display: inline-flex;
      gap: 14px;
      padding: 9px 12px;
      border-radius: 12px;
      background: #f4f5f6;
      color: #6b7280;
      font-size: 12px;
      border: 1px solid #e1e4e7;
      width: 100%;
    }
  </style>
</head>
